name: Build and Run Demos (x86 & ARM64)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-run:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm]

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake libvulkan1 \
          libvulkan-dev vulkan-tools vulkan-validationlayers \
          spirv-tools mesa-vulkan-drivers libstb-dev libglm-dev libglfw3-dev \
          xvfb libx11-dev

    - name: Build and Run Each Demo
      run: |
        # Find the correct software driver for the current architecture
        LVP_PATH=$(find /usr/share/vulkan/icd.d/ -name "lvp_icd.*.json" | head -n 1)
        export VK_DRIVER_FILES=$LVP_PATH
        
        # Point to where Ubuntu stores the validation layer manifests
        export VK_LAYER_PATH=/usr/share/vulkan/explicit_layer.d

        for demo_dir in demo/*/; do
          echo "----------------------------------------"
          echo "Processing: $demo_dir"
          echo "----------------------------------------"
          
          cd "$demo_dir"
          mkdir -p build && cd build
          
          if ! cmake ..; then exit 1; fi
          if ! make; then exit 1; fi
          
          EXEC=$(find . -maxdepth 1 -type f -executable ! -name "CMake*" ! -name "Makefile")
          
          if [ -n "$EXEC" ]; then
            echo "Running $EXEC with Lavapipe..."
            
            # Use xvfb-run for virtual display
            # timeout 10s for the game loop
            set +e
            timeout --preserve-status 10s xvfb-run --auto-servernum "$EXEC"
            EXIT_STATUS=$?
            set -e

            # SUCCESS CODES: 
            # 0   = Program finished naturally
            # 124 = Timeout (default)
            # 143 = Timeout (SIGTERM)
            if [ $EXIT_STATUS -eq 0 ] || [ $EXIT_STATUS -eq 124 ] || [ $EXIT_STATUS -eq 143 ]; then
              echo "Execution of $EXEC finished successfully (Exit Code: $EXIT_STATUS)."
            else
              echo "::error::$EXEC CRASHED with exit code $EXIT_STATUS"
              exit 1
            fi
          fi
          
          cd "${GITHUB_WORKSPACE}"
        done
