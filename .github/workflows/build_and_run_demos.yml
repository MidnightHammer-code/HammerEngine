name: Build Demos (x86 & ARM64)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm]

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        # Installs build tools and graphics headers for compilation
        sudo apt-get install -y build-essential cmake libvulkan-dev \
          vulkan-validationlayers spirv-tools libstb-dev libglm-dev libglfw3-dev

    - name: Build Each Demo
      run: |
        for demo_dir in demo/*/; do
          echo "----------------------------------------"
          echo "Building: $demo_dir"
          echo "----------------------------------------"
          
          cd "$demo_dir"
          mkdir -p build && cd build
          
          # Run CMake and Make. If either fails, the Action will stop.
          if ! cmake ..; then
            echo "::error::CMake failed in $demo_dir"
            exit 1
          fi
          
          if ! make; then
            echo "::error::Make failed in $demo_dir"
            exit 1
          fi
          
          echo "Successfully built $demo_dir"
          
          # Return to root for the next iteration
          cd "${GITHUB_WORKSPACE}"
        done
