name: Build and Run Demos (x86 & ARM64)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-run:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm]

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake libvulkan1 \
          libvulkan-dev vulkan-tools vulkan-validationlayers \
          spirv-tools mesa-vulkan-drivers libstb-dev libglm-dev libglfw3-dev \
          xvfb libx11-dev

    - name: Build and Run Each Demo
      run: |
        # 1. ARCH-AGNOSTIC DRIVER DETECTION
        # We look for the Lavapipe driver and set BOTH variables for maximum compatibility.
        LVP_PATH=$(find /usr/share/vulkan/icd.d/ -name "lvp_icd.*.json" | head -n 1)
        
        export VK_DRIVER_FILES="$LVP_PATH"
        export VK_ICD_FILENAMES="$LVP_PATH"
        
        # 2. VALIDATION LAYERS
        export VK_LAYER_PATH=/usr/share/vulkan/explicit_layer.d
        
        # 3. GRAPHICS EMULATION
        # Tell Mesa to use software rendering (llvmpipe/lavapipe)
        export GALLIUM_DRIVER=llvmpipe

        for demo_dir in demo/*/; do
          echo "----------------------------------------"
          echo "Processing: $demo_dir"
          echo "----------------------------------------"
          
          cd "$demo_dir"
          mkdir -p build && cd build
          
          if ! cmake ..; then exit 1; fi
          if ! make; then exit 1; fi
          
          EXEC=$(find . -maxdepth 1 -type f -executable ! -name "CMake*" ! -name "Makefile")
          
          if [ -n "$EXEC" ]; then
            echo "Running $EXEC with Driver: $LVP_PATH"
            
            set +e
            # --auto-servernum ensures we don't conflict with other X servers
            # --server-args provides a fake screen size/depth
            timeout --preserve-status 10s xvfb-run --auto-servernum --server-args="-screen 0 1280x720x24" "$EXEC"
            EXIT_STATUS=$?
            set -e

            if [ $EXIT_STATUS -eq 0 ] || [ $EXIT_STATUS -eq 124 ] || [ $EXIT_STATUS -eq 143 ]; then
              echo "Execution of $EXEC finished successfully (Exit Code: $EXIT_STATUS)."
            else
              # Print Vulkan info on failure to help debug why the driver wasn't found
              echo "::error::$EXEC CRASHED with exit code $EXIT_STATUS"
              echo "Vulkan Info Status:"
              vulkaninfo --summary || echo "vulkaninfo failed"
              exit 1
            fi
          fi
          
          cd "${GITHUB_WORKSPACE}"
        done
