name: Build and Run Demos (x86 & ARM64)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-run:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm]

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake libvulkan-dev vulkan-tools vulkan-validationlayers spirv-tools mesa-vulkan-drivers libstb-dev libglm-dev libglfw3-dev

    - name: Build and Run Each Demo
      run: |
        for demo_dir in demo/*/; do
          echo "----------------------------------------"
          echo "Processing: $demo_dir"
          echo "----------------------------------------"
          
          cd "$demo_dir"
          mkdir -p build && cd build
          
          if ! cmake ..; then exit 1; fi
          if ! make; then exit 1; fi
          
          EXEC=$(find . -maxdepth 1 -type f -executable ! -name "CMake*" ! -name "Makefile")
          
          if [ -n "$EXEC" ]; then
            echo "Running $EXEC..."
            
            # VK_ICD_FILENAMES/VK_LOADER_DRIVERS_SELECT: Forces the use of Lavapipe (CPU Vulkan)
            # xvfb-run: Provides the virtual X server
            # We remove the strict exit code check so if it finishes in 1s, it passes.
            export VK_DRIVER_FILES=/usr/share/vulkan/icd.d/lvp_icd.x86_64.json
            
            timeout --preserve-status 10s xvfb-run --auto-servernum "$EXEC" || {
              EXIT_STATUS=$?
              # If it timed out (124), that's fine. If it crashed (anything else), we check logs.
              if [ $EXIT_STATUS -ne 124 ] && [ $EXIT_STATUS -ne 0 ]; then
                echo "::error::$EXEC crashed with exit code $EXIT_STATUS"
                exit 1
              fi
            }
            echo "Execution of $EXEC finished successfully."
          fi
          
          cd "${GITHUB_WORKSPACE}"
        done
