name: Build and Run Demos (x86 & ARM64)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-run:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm]

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake \
          libvulkan-dev vulkan-tools vulkan-utility-libraries-dev \
          spirv-tools mesa-vulkan-drivers libstb-dev libglm-dev libglfw3-dev \
          xvfb libx11-dev

    - name: Build and Run Each Demo
      run: |
        # Dynamically find the Vulkan driver to avoid arch-mismatch (x86 vs ARM)
        # This finds the lvp (Lavapipe) driver regardless of architecture
        LVP_PATH=$(find /usr/share/vulkan/icd.d/ -name "lvp_icd.*.json" | head -n 1)
        export VK_DRIVER_FILES=$LVP_PATH
        
        # Tell the Vulkan Loader where validation layers are kept
        export VK_LAYER_PATH=/usr/share/vulkan/explicit_layer.d
        
        # Optional: Force validation layers on even if the app doesn't request them
        # export VK_INSTANCE_LAYERS=VK_LAYER_KHRONOS_validation

        for demo_dir in demo/*/; do
          echo "----------------------------------------"
          echo "Processing: $demo_dir"
          echo "----------------------------------------"
          
          cd "$demo_dir"
          mkdir -p build && cd build
          
          if ! cmake ..; then exit 1; fi
          if ! make; then exit 1; fi
          
          EXEC=$(find . -maxdepth 1 -type f -executable ! -name "CMake*" ! -name "Makefile")
          
          if [ -n "$EXEC" ]; then
            echo "Running $EXEC with Lavapipe and Validation Layers..."
            
            # xvfb-run provides the X server
            # timeout 10s handles the game loop
            timeout --preserve-status 10s xvfb-run --auto-servernum "$EXEC" || {
              EXIT_STATUS=$?
              if [ $EXIT_STATUS -ne 124 ] && [ $EXIT_STATUS -ne 0 ]; then
                echo "::error::$EXEC crashed with exit code $EXIT_STATUS"
                exit 1
              fi
            }
            echo "Execution of $EXEC finished successfully."
          fi
          
          cd "${GITHUB_WORKSPACE}"
        done
